services:
  frontend:
    # Production service: builds and serves the application using Vite preview
    build:
      context: .
      args:
        - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${PORT:-5173}:5173"

  frontend-dev:
    # Development service: runs the Vite development server with hot reload
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8000}
    command: npm run dev
